name: CI — Lint, Type Check, Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  web:
    name: Web App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Provide placeholder env vars so build doesn't crash on missing secrets
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          NEXT_PUBLIC_SITE_URL: https://afterhours.ai
          STRIPE_STARTER_MONTHLY_PRICE_ID: price_placeholder
          STRIPE_STARTER_ANNUAL_PRICE_ID: price_placeholder
          STRIPE_PROFESSIONAL_MONTHLY_PRICE_ID: price_placeholder
          STRIPE_PROFESSIONAL_ANNUAL_PRICE_ID: price_placeholder
          STRIPE_SCALE_MONTHLY_PRICE_ID: price_placeholder
          STRIPE_SCALE_ANNUAL_PRICE_ID: price_placeholder
          STRIPE_ENTERPRISE_MONTHLY_PRICE_ID: price_placeholder
          STRIPE_ENTERPRISE_ANNUAL_PRICE_ID: price_placeholder

  admin:
    name: Admin App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint
